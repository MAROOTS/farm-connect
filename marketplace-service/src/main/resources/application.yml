server:
  port: 8082

spring:
  application:
    name: marketplace-service

  datasource:
    url: jdbc:postgresql://localhost:5432/agriconnect_marketplace
    username: agriconnect
    password: agriconnect123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

africastalking:
  username: sandbox
  api-key: ${AT_API_KEY}
  sender-id: AgriConnect

otp:
  expiry-minutes: 5
  length: 6