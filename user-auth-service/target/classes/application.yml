server:
  port: 8081

spring:
  application:
    name: user-auth-service

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/agriconnect_auth
    username: agriconnect
    password: agriconnect123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis (OTP storage)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Gmail SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}        # set in environment variable
    password: ${MAIL_PASSWORD}        # Gmail App Password, not your real password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# JWT config
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

# OTP config
otp:
  expiry-minutes: 5
  length: 6